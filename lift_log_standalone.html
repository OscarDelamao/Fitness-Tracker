<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<title>Lift Log</title>
</head>
<body style="margin:0;background:#0d0f11;">
<div id="app">
  <div id="boot" class="boot">LOADING…</div>
</div>

<script>
/* Build an app manifest and icon at runtime so Android Chrome can install this
   single file as a standalone app with its own home screen icon. */
(function(){
  try{
    function makeIcon(size){
      var c=document.createElement("canvas"); c.width=size; c.height=size;
      var x=c.getContext("2d");
      x.fillStyle="#0d0f11"; x.fillRect(0,0,size,size);
      x.fillStyle="#16191d"; var r=size*0.18;
      x.strokeStyle="#e6a02c"; x.lineWidth=size*0.06;
      // rounded panel
      x.beginPath();
      x.moveTo(size*0.12+r,size*0.12);
      x.arcTo(size*0.88,size*0.12,size*0.88,size*0.88,r);
      x.arcTo(size*0.88,size*0.88,size*0.12,size*0.88,r);
      x.arcTo(size*0.12,size*0.88,size*0.12,size*0.12,r);
      x.arcTo(size*0.12,size*0.12,size*0.88,size*0.12,r);
      x.closePath(); x.fill(); x.stroke();
      x.fillStyle="#e6a02c";
      x.font="bold "+Math.round(size*0.42)+"px ui-monospace, monospace";
      x.textAlign="center"; x.textBaseline="middle";
      x.fillText("LL", size*0.5, size*0.54);
      return c.toDataURL("image/png");
    }
    var i512=makeIcon(512), i192=makeIcon(192);
    var manifest={
      name:"Lift Log", short_name:"Lift Log",
      start_url:location.href.split("#")[0],
      scope:"./", display:"standalone",
      background_color:"#0d0f11", theme_color:"#0d0f11",
      icons:[
        {src:i192,sizes:"192x192",type:"image/png",purpose:"any"},
        {src:i512,sizes:"512x512",type:"image/png",purpose:"any maskable"}
      ]
    };
    var burl=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));
    var ml=document.createElement("link"); ml.rel="manifest"; ml.href=burl; document.head.appendChild(ml);
    var al=document.createElement("link"); al.rel="apple-touch-icon"; al.href=i192; document.head.appendChild(al);
    var fav=document.createElement("link"); fav.rel="icon"; fav.href=i192; document.head.appendChild(fav);
  }catch(e){}
})();
</script>

<style>
  :root{
    --bg:#0d0f11;
    --panel:#16191d;
    --panel-2:#1d2126;
    --line:#2a2f36;
    --line-bright:#3a424b;
    --ink:#e9e7e1;
    --ink-dim:#8b929b;
    --ink-faint:#5b626b;
    --amber:#e6a02c;
    --amber-dim:#7a5a1e;
    --red:#e5484d;
    --green:#3fb56b;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  #app{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--bg);
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    padding:0 0 140px;
    position:relative;
  }
  .boot{font-family:var(--mono);color:var(--ink-dim);text-align:center;padding:80px 0;letter-spacing:.2em;font-size:13px}

  /* header */
  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--bg) 70%,rgba(13,15,17,0));
    padding:18px 18px 12px;
  }
  .brand{display:flex;align-items:baseline;justify-content:space-between}
  .brand h1{
    font-family:var(--mono);font-size:15px;font-weight:700;margin:0;
    letter-spacing:.22em;color:var(--ink);
  }
  .brand h1 span{color:var(--amber)}
  .brand .date{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.1em}

  /* tab bar */
  .tabs{display:flex;gap:6px;margin-top:14px}
  .tab{
    flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    padding:9px 0;text-align:center;border:1px solid var(--line);
    background:var(--panel);color:var(--ink-dim);border-radius:7px;
    cursor:pointer;user-select:none;transition:.12s;
  }
  .tab.active{color:var(--bg);background:var(--amber);border-color:var(--amber);font-weight:700}

  main{padding:4px 14px 0}

  /* workout picker cards */
  .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
  .pick{
    border:1px solid var(--line);background:var(--panel);border-radius:11px;
    padding:16px 14px;cursor:pointer;transition:.12s;position:relative;overflow:hidden;
  }
  .pick:active{transform:scale(.98)}
  .pick .code{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:.2em}
  .pick .name{font-size:19px;font-weight:700;margin:6px 0 2px;letter-spacing:-.01em}
  .pick .meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .pick .tick{position:absolute;right:12px;top:12px;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}

  .section-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-faint);
    margin:22px 2px 10px;text-transform:uppercase;
  }

  /* exercise block */
  .ex{
    border:1px solid var(--line);background:var(--panel);border-radius:12px;
    margin-bottom:12px;overflow:hidden;
  }
  .ex-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 14px;gap:10px;cursor:pointer;
  }
  .ex-head .t{min-width:0}
  .ex-name{font-size:15px;font-weight:650;line-height:1.2;letter-spacing:-.01em}
  .ex-sub{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:4px;letter-spacing:.06em}
  .ss-badge{color:var(--amber);border:1px solid var(--amber-dim);border-radius:4px;padding:1px 4px;margin-right:6px;font-size:9px}
  .rest-btn{
    flex:none;font-family:var(--mono);font-size:12px;font-weight:700;
    padding:9px 12px;border-radius:9px;border:1px solid var(--line-bright);
    background:var(--panel-2);color:var(--amber);cursor:pointer;letter-spacing:.05em;
    display:flex;flex-direction:column;align-items:center;line-height:1.1;gap:2px;
  }
  .rest-btn small{color:var(--ink-faint);font-size:8px;letter-spacing:.1em}

  .sets{padding:0 10px 10px}
  .set-row{
    display:grid;grid-template-columns:26px 1fr 1fr 1fr 34px;gap:7px;align-items:center;
    padding:6px 4px;border-top:1px solid var(--line);
  }
  .set-row.hdr{border-top:none;padding-bottom:2px}
  .set-row.hdr span{font-family:var(--mono);font-size:9px;color:var(--ink-faint);letter-spacing:.1em;text-align:center}
  .set-row.hdr .sidx{text-align:left}
  .sidx{font-family:var(--mono);font-size:12px;color:var(--ink-dim);font-weight:700}
  .cell input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;
    color:var(--ink);font-family:var(--mono);font-size:15px;font-weight:600;text-align:center;
    padding:9px 2px;outline:none;transition:.12s;
  }
  .cell input:focus{border-color:var(--amber);background:#20242a}
  .cell input::placeholder{color:var(--ink-faint);font-weight:400}
  .done-btn{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--line-bright);
    background:var(--panel-2);color:var(--ink-faint);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .set-row.done input{border-color:var(--amber-dim);color:var(--amber)}
  .set-row.done .done-btn{background:var(--green);border-color:var(--green);color:#08210f;font-weight:800}
  .note-in{
    width:100%;background:transparent;border:none;border-top:1px dashed var(--line);
    color:var(--ink-dim);font-family:var(--sans);font-size:13px;padding:9px 6px 3px;outline:none;
  }
  .note-in::placeholder{color:var(--ink-faint)}
  .set-ctrl{display:flex;gap:8px;padding:8px 4px 2px}
  .mini{
    flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:8px 0;
    border-radius:8px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink-dim);cursor:pointer;
  }
  .mini:active{background:#20242a}

  /* edit / reorder mode */
  .editbar{display:flex;margin:2px 0 12px}
  .editbar-btn{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink-dim);
    padding:9px 14px;border:1px solid var(--line);border-radius:8px;background:var(--panel);
    cursor:pointer;
  }
  .editbar-btn:active{background:var(--panel-2)}
  .managehint{font-family:var(--mono);font-size:11px;color:var(--ink-faint);line-height:1.6;margin:0 2px 12px}
  .exlist{display:flex;flex-direction:column;gap:9px}
  .mrow{
    display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:10px 12px;
  }
  .mrow.dragging{opacity:.9;border-color:var(--amber);background:var(--panel-2);
    box-shadow:0 10px 26px rgba(0,0,0,.5);position:relative;z-index:5}
  .mhandle{
    flex:none;font-size:18px;color:var(--ink-faint);cursor:grab;
    padding:4px 6px;touch-action:none;user-select:none;line-height:1;letter-spacing:-2px;
  }
  .mhandle:active{cursor:grabbing;color:var(--amber)}
  .minfo{flex:1;min-width:0;cursor:pointer}
  .mname{font-size:15px;font-weight:600;line-height:1.2}
  .msub{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrest{font-family:var(--mono);font-size:12px;color:var(--amber);flex:none}
  .mdel{flex:none;font-size:13px;color:var(--ink-faint);padding:6px 8px;cursor:pointer}
  .mdel:active{color:var(--red)}

  .mrow.editing{display:block;padding:14px;border-color:var(--amber-dim)}
  .editor label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-faint);margin:10px 0 5px;text-transform:uppercase}
  .editor label:first-child{margin-top:0}
  .ed-in{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);font-family:var(--sans);font-size:15px;padding:11px 10px;outline:none;
  }
  .ed-in:focus{border-color:var(--amber)}
  .restrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .restnum{width:74px;text-align:center;font-family:var(--mono);font-weight:600}
  .chip{
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);padding:9px 11px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel-2);cursor:pointer;
  }
  .chip:active{background:var(--amber);color:var(--bg);border-color:var(--amber)}
  .ssrow{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-transform:none;letter-spacing:0;margin-top:12px}
  .ssrow input{width:18px;height:18px;accent-color:var(--amber)}
  .editbtns{display:flex;gap:9px;margin-top:14px}
  .btn.sm{padding:11px 0;font-size:11px}

  /* template save prompt modal */
  .modal-wrap{
    position:fixed;inset:0;z-index:50;background:rgba(6,7,9,.72);
    display:flex;align-items:flex-end;justify-content:center;
    max-width:520px;margin:0 auto;padding:0 14px calc(20px + env(safe-area-inset-bottom));
    animation:fade .16s ease;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width:100%;background:var(--panel);border:1px solid var(--line-bright);
    border-radius:16px;padding:18px 18px 16px;box-shadow:0 -10px 50px rgba(0,0,0,.6);
    animation:rise .2s cubic-bezier(.4,0,.2,1);
  }
  @keyframes rise{from{transform:translateY(20px)}to{transform:translateY(0)}}
  .modal-t{font-family:var(--mono);font-size:13px;letter-spacing:.14em;color:var(--amber);text-transform:uppercase}
  .modal-b{font-size:14px;color:var(--ink-dim);line-height:1.55;margin-top:10px}
  .modal-b b{color:var(--ink);font-weight:600}
  .modal-btns{display:flex;flex-direction:column;gap:9px;margin-top:16px}
  .modal-btns .btn{padding:14px 0}

  /* session controls */
  .bar{display:flex;gap:10px;margin:10px 0 4px}
  .btn{
    flex:1;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;
    padding:14px 0;border-radius:10px;cursor:pointer;text-align:center;border:1px solid var(--line-bright);
    background:var(--panel);color:var(--ink);
  }
  .btn.primary{background:var(--amber);color:var(--bg);border-color:var(--amber)}
  .btn.ghost{background:transparent;color:var(--ink-dim)}
  .btn:active{transform:scale(.99)}

  /* history */
  .hist{border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:14px;margin-bottom:10px}
  .hist .top{display:flex;justify-content:space-between;align-items:baseline}
  .hist .wk{font-weight:700;font-size:15px}
  .hist .dt{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .hist .line{font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin-top:8px;line-height:1.6}
  .hist .line b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--ink-faint);font-family:var(--mono);font-size:12px;padding:50px 20px;line-height:1.7}

  /* export */
  .exp-box{
    width:100%;height:230px;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    color:var(--ink-dim);font-family:var(--mono);font-size:11px;padding:12px;resize:none;line-height:1.5;
  }

  /* rest timer sheet */
  .timer{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    max-width:520px;margin:0 auto;
    background:var(--panel);border-top:1px solid var(--line-bright);
    border-radius:18px 18px 0 0;padding:14px 18px calc(18px + env(safe-area-inset-bottom));
    transform:translateY(120%);transition:transform .22s cubic-bezier(.4,0,.2,1);
    box-shadow:0 -18px 40px rgba(0,0,0,.5);
  }
  .timer.up{transform:translateY(0)}
  .timer .thead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .timer .for{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.06em;max-width:70%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .timer .x{font-family:var(--mono);font-size:12px;color:var(--ink-faint);cursor:pointer;padding:4px 8px}
  .clock{
    font-family:var(--mono);font-size:64px;font-weight:700;text-align:center;
    letter-spacing:.04em;line-height:1;margin:6px 0 4px;color:var(--amber);
    font-variant-numeric:tabular-nums;
  }
  .clock.done{color:var(--red)}
  .tctrls{display:flex;gap:8px;margin-top:10px}
  .tctrls button{
    flex:1;font-family:var(--mono);font-size:13px;font-weight:700;padding:13px 0;border-radius:10px;
    border:1px solid var(--line-bright);background:var(--panel-2);color:var(--ink);cursor:pointer;
  }
  .tctrls button.go{background:var(--amber);color:var(--bg);border-color:var(--amber)}
  .tctrls .adj{color:var(--ink-dim);flex:.7}

  /* flash overlay */
  #flash{
    position:fixed;inset:0;z-index:60;background:var(--red);opacity:0;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
  }
  #flash.on{animation:flash 1s steps(1) infinite;pointer-events:auto}
  #flash .msg{font-family:var(--mono);font-weight:700;font-size:22px;letter-spacing:.2em;color:#fff}
  @keyframes flash{0%{opacity:.92}50%{opacity:0}}

  .hint{font-family:var(--mono);font-size:11px;color:var(--ink-faint);line-height:1.6;margin:8px 2px 0}
  .addx{width:100%;margin-top:4px}
</style>

<script>
(function(){
  "use strict";

  // ---------- storage layer (browser localStorage, persists on this device) ----------
  var PFX="liftlog:";
  function _probe(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } }
  var LS=_probe();
  var HAS=LS;
  var mem={};
  async function sGet(k){
    if(LS){ var v=localStorage.getItem(PFX+k); return v===null?null:{value:v}; }
    return (k in mem)?{value:mem[k]}:null;
  }
  async function sSet(k,v){
    if(LS){ try{ localStorage.setItem(PFX+k,v); }catch(e){} return; }
    mem[k]=v;
  }
  async function sList(p){
    if(LS){
      var out=[];
      for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        if(key && key.indexOf(PFX)===0){ var bare=key.slice(PFX.length); if(bare.indexOf(p)===0) out.push(bare); }
      }
      return {keys:out};
    }
    return {keys:Object.keys(mem).filter(function(x){return x.indexOf(p)===0;})};
  }
  async function sDel(k){
    if(LS){ localStorage.removeItem(PFX+k); return; }
    delete mem[k];
  }

  // ---------- default templates ----------
  function ex(name, restSec, ss, sub){ return {name:name, restSec:restSec, ss:!!ss, sub:sub||""}; }
  var DEFAULT_TEMPLATES = {
    order:["PUSH","PULL","CORE","PUMP"],
    PUSH:{ code:"01", name:"Push", ex:[
      ex("Incline DB Press",90,false,"4×8-12 · RPE8 · 3/0/1"),
      ex("Flat DB Press",0,true,"3×10-15 · RPE9"),
      ex("DB Lateral Raise",75,true,"3×12-20 · RPE9"),
      ex("Pec Flye",0,true,"3×12-20 · 2s stretch"),
      ex("Overhead DB Tricep Ext",75,true,"3×10-15 · full stretch"),
      ex("DB Lateral Raise (burnout)",0,true,"2×15-25 · partials"),
      ex("DB Skullcrusher / Pushdown",60,false,"2×12-20 · to failure")
    ]},
    PULL:{ code:"02", name:"Pull", ex:[
      ex("Weighted / Assisted Pull-up",90,false,"4×6-12 · RPE8 · full stretch"),
      ex("Chest-Supported DB Row",0,true,"3×10-15 · torso planted"),
      ex("DB Pullover",75,true,"3×12-15 · lats not tris"),
      ex("Wide Pulldown",0,true,"3×10-15 · to upper chest"),
      ex("DB Rear Delt Flye",75,true,"3×15-20 · traps quiet"),
      ex("Incline DB Curl",0,true,"3×10-15 · 3s lower"),
      ex("DB Hammer Curl",60,false,"3×12-15 · to failure")
    ]},
    CORE:{ code:"03", name:"Core", ex:[
      ex("DB Shrug",60,false,"4×12-20 · 1s hold top"),
      ex("Hanging Leg Raise",0,true,"4×10-20 · no swing"),
      ex("Heavy Shrug Hold",75,true,"4×8-12 · 3s hold"),
      ex("Cable Crunch",0,true,"3×15-20 · ribs to pelvis"),
      ex("DB Wrist Curl",45,true,"3×15-25 · full stretch"),
      ex("Ab Wheel / Plank",0,true,"3×8-15 / 45s"),
      ex("DB Reverse Wrist Curl",0,true,"3×15-25 · control neg"),
      ex("Farmer Hold",60,false,"2×30-45s · heaviest")
    ]},
    PUMP:{ code:"04", name:"Arm+Delt Pump", ex:[
      ex("DB Lateral Raise",0,true,"4×15-25 · constant tension"),
      ex("Incline DB Curl",0,true,"4×12-15 · stretch"),
      ex("Overhead DB Tricep Ext",45,true,"4×12-15 · deep stretch"),
      ex("DB Rear Delt Flye",0,true,"3×20-25 · squeeze"),
      ex("DB Hammer Curl",0,true,"3×15-20 · no swing"),
      ex("DB Overhead Ext / Pushdown",45,false,"3×15-20 · burnout")
    ]}
  };

  // ---------- state ----------
  var S = {
    view:"log",
    templates:null,
    session:null,        // active session object
    editMode:false,      // reorder / edit exercises
    editingEx:-1,        // which exercise is open in the inline editor
    templatePrompt:null, // {ei} pending "save to template?" choice
    timer:{ open:false, running:false, remain:0, total:0, forName:"", handle:null, done:false }
  };

  var $app = document.getElementById("app");

  // ---------- init ----------
  (async function init(){
    var t = await sGet("templates");
    S.templates = (t && t.value) ? JSON.parse(t.value) : DEFAULT_TEMPLATES;
    if(ensureTemplateIds()){ await sSet("templates", JSON.stringify(S.templates)); }
    var cur = await sGet("activeSession");
    if(cur && cur.value){ try{ S.session = JSON.parse(cur.value); }catch(e){} }
    render();
  })();

  // give every template exercise a stable id so edits can map back to it
  function ensureTemplateIds(){
    var changed=false;
    (S.templates.order||[]).forEach(function(code){
      var tpl=S.templates[code]; if(!tpl||!tpl.ex) return;
      tpl.ex.forEach(function(e,i){ if(e.id==null){ e.id="t_"+code+"_"+i; changed=true; } });
    });
    return changed;
  }

  // ---------- helpers ----------
  function todayISO(){ return new Date().toISOString(); }
  function fmtDate(iso){
    var d=new Date(iso);
    var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return days[d.getDay()]+" "+d.getDate()+" "+mo[d.getMonth()];
  }
  function mmss(s){ var m=Math.floor(s/60), r=s%60; return (m<10?"0":"")+m+":"+(r<10?"0":"")+r; }
  function esc(x){ return (x==null?"":(""+x)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function newSession(code){
    var t=S.templates[code];
    return {
      id:"session:"+Date.now(),
      date:todayISO(),
      code:code,
      workout:t.name,
      exercises:t.ex.map(function(e){
        return {name:e.name, sub:e.sub, ss:e.ss, restSec:e.restSec, tid:e.id,
          sets:[{weight:"",reps:"",rpe:"",note:"",done:false}]};
      })
    };
  }

  async function persistSession(){
    if(S.session) await sSet("activeSession", JSON.stringify(S.session));
  }

  // write an edited session exercise back to its workout template
  async function applyToTemplate(ei){
    if(!S.session) return;
    var ex=S.session.exercises[ei];
    var tpl=S.templates[S.session.code];
    if(!tpl||!tpl.ex) return;
    var entry=null;
    if(ex.tid!=null){ entry=tpl.ex.filter(function(e){return e.id===ex.tid;})[0]; }
    if(!entry){ entry=tpl.ex.filter(function(e){return e.name===ex.name;})[0]; }
    if(entry){
      entry.name=ex.name; entry.sub=ex.sub; entry.ss=ex.ss; entry.restSec=ex.restSec;
    } else {
      var nid="t_add_"+Date.now();
      tpl.ex.push({id:nid,name:ex.name,sub:ex.sub,ss:ex.ss,restSec:ex.restSec});
      ex.tid=nid; await persistSession();
    }
    await sSet("templates", JSON.stringify(S.templates));
  }

  async function finishSession(){
    if(!S.session) return;
    // only save if something was logged
    var logged = S.session.exercises.some(function(ex){
      return ex.sets.some(function(s){ return s.weight||s.reps||s.done; });
    });
    if(logged){ await sSet(S.session.id, JSON.stringify(S.session)); }
    S.session=null;
    await sSet("activeSession","");
    if(!HAS) delete mem["activeSession"];
    S.view="history";
    render();
  }

  async function renderHistory(m){
    m.innerHTML='<div class="empty">Loading history…</div>';
    var res=await sList("session:");
    var keys=(res&&res.keys)?res.keys.slice():[];
    keys.sort().reverse();
    if(!keys.length){ m.innerHTML='<div class="empty">No sessions saved yet.<br>Log a workout and it lands here.</div>'; return; }
    var out='<div class="section-label">'+keys.length+' session'+(keys.length>1?'s':'')+' logged</div>';
    for(var i=0;i<keys.length;i++){
      var r=await sGet(keys[i]); if(!r||!r.value) continue;
      var ss; try{ ss=JSON.parse(r.value); }catch(e){ continue; }
      out+='<div class="hist">';
      out+='<div class="top"><div class="wk">'+esc(ss.workout)+'</div><div class="dt">'+fmtDate(ss.date)+'</div></div>';
      ss.exercises.forEach(function(ex){
        var top=ex.sets.filter(function(s){return s.weight||s.reps;});
        if(!top.length) return;
        var parts=top.map(function(s){ return (s.weight||"?")+"×"+(s.reps||"?"); });
        out+='<div class="line"><b>'+esc(ex.name)+'</b> — '+parts.join(", ")+'</div>';
      });
      out+='</div>';
    }
    m.innerHTML=out;
  }

  function downloadFile(name, text, mime){
    try{
      var blob=new Blob([text],{type:mime||"text/plain"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a"); a.href=url; a.download=name;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },600);
    }catch(e){ alert("Could not create the file on this browser."); }
  }

  async function doBackup(){
    var res=await sList("session:");
    var keys=(res&&res.keys)?res.keys.slice():[];
    var sessions={};
    for(var i=0;i<keys.length;i++){ var r=await sGet(keys[i]); if(r&&r.value) sessions[keys[i]]=r.value; }
    var payload={ app:"lift-log", version:1, exportedAt:new Date().toISOString(),
      templates:JSON.stringify(S.templates), sessions:sessions };
    var stamp=new Date().toISOString().slice(0,10);
    downloadFile("liftlog-backup-"+stamp+".json", JSON.stringify(payload), "application/json");
  }

  async function doRestore(file){
    var msg=document.getElementById("restoremsg");
    var reader=new FileReader();
    reader.onload=async function(){
      try{
        var data=JSON.parse(reader.result);
        if(!data||data.app!=="lift-log"||!data.sessions){ throw new Error("bad"); }
        if(data.templates){ await sSet("templates", data.templates); try{ S.templates=JSON.parse(data.templates); }catch(_){} }
        var n=0;
        for(var k in data.sessions){ if(data.sessions.hasOwnProperty(k)){ await sSet(k, data.sessions[k]); n++; } }
        if(msg){ msg.textContent="Restored "+n+" session"+(n===1?"":"s")+". Opening history."; }
        S.view="history"; setTimeout(render, 400);
      }catch(e){
        if(msg){ msg.textContent="That file did not look like a Lift Log backup."; }
      }
    };
    reader.readAsText(file);
  }

  function openTimer(name,sec){
    stopFlash();
    var t=S.timer;
    if(t.handle){ clearInterval(t.handle); t.handle=null; }
    t.open=true; t.forName=name; t.total=sec>0?sec:60; t.remain=t.total;
    t.running=false; t.done=false;
    render();
    startTimer();
  }
  function startTimer(){
    var t=S.timer;
    if(t.handle){ clearInterval(t.handle); }
    t.running=true; t.done=false; syncTimer();
    t.handle=setInterval(function(){
      t.remain--;
      if(t.remain<=0){ t.remain=0; clearInterval(t.handle); t.handle=null; t.running=false; t.done=true; syncTimer(); alarm(); }
      else syncTimer();
    },1000);
    updateToggle();
  }
  function pauseTimer(){ var t=S.timer; if(t.handle){clearInterval(t.handle);t.handle=null;} t.running=false; updateToggle(); }
  function toggleTimer(){
    var t=S.timer;
    if(t.done){ t.remain=t.total; t.done=false; syncTimer(); startTimer(); return; }
    if(t.running) pauseTimer(); else startTimer();
  }
  function adjTimer(d){
    var t=S.timer; t.remain=Math.max(0,t.remain+d); t.total=Math.max(0,t.total+d);
    if(t.done && t.remain>0){ t.done=false; }
    syncTimer();
  }
  function closeTimer(){
    var t=S.timer; if(t.handle){clearInterval(t.handle);t.handle=null;}
    t.open=false; t.running=false; t.done=false; stopFlash();
    document.getElementById("timer").classList.remove("up");
  }
  function syncTimer(){
    var c=document.getElementById("clock");
    if(c){ c.textContent=mmss(S.timer.remain); c.classList.toggle("done",S.timer.done); }
  }
  function updateToggle(){
    var b=document.querySelector("[data-ttoggle]");
    if(b) b.textContent = S.timer.running?"PAUSE":(S.timer.done?"RESET":"START");
  }

  // ---------- alarm: flash + vibrate + beep ----------
  var audioCtx=null, flashTimeout=null;
  function alarm(){
    updateToggle();
    var f=document.getElementById("flash");
    if(f){ f.classList.add("on"); }
    if(navigator.vibrate){ navigator.vibrate([250,120,250,120,500]); }
    beep();
    if(flashTimeout) clearTimeout(flashTimeout);
    flashTimeout=setTimeout(stopFlash,8000);
  }
  function stopFlash(){
    var f=document.getElementById("flash");
    if(f) f.classList.remove("on");
    if(flashTimeout){ clearTimeout(flashTimeout); flashTimeout=null; }
  }
  function beep(){
    try{
      if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      var n=0;
      var t=setInterval(function(){
        var o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.frequency.value=880; o.type="square";
        g.gain.setValueAtTime(.0001,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(.25,audioCtx.currentTime+.02);
        g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.18);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+.2);
        if(++n>=3) clearInterval(t);
      },260);
    }catch(e){}
  }

  // ---------- events ----------
  function wire(){
    // tabs
    Array.prototype.forEach.call(document.querySelectorAll("[data-tab]"),function(el){
      el.onclick=function(){ S.view=el.getAttribute("data-tab"); render(); };
    });
    // start session
    Array.prototype.forEach.call(document.querySelectorAll("[data-start]"),function(el){
      el.onclick=async function(){ S.session=newSession(el.getAttribute("data-start")); await persistSession(); render(); };
    });
    // finish / discard
    var fin=document.querySelector("[data-finish]"); if(fin) fin.onclick=finishSession;
    var dis=document.querySelector("[data-discard]"); if(dis) dis.onclick=async function(){
      S.session=null; await sSet("activeSession",""); if(!HAS) delete mem["activeSession"]; S.view="log"; render();
    };

    // ---- edit / reorder mode ----
    Array.prototype.forEach.call(document.querySelectorAll("[data-editmode]"),function(el){
      el.onclick=function(){ S.editMode=!S.editMode; S.editingEx=-1; render(); };
    });
    // open inline editor for an exercise
    Array.prototype.forEach.call(document.querySelectorAll("[data-editex]"),function(el){
      el.onclick=function(){ S.editingEx=+el.getAttribute("data-editex"); render(); };
    });
    // cancel editor
    var cx=document.querySelector("[data-cancelex]"); if(cx) cx.onclick=function(){ S.editingEx=-1; render(); };
    // rest chips inside editor
    Array.prototype.forEach.call(document.querySelectorAll("[data-restchip]"),function(el){
      el.onclick=function(){ var n=document.querySelector('.restnum'); if(n) n.value=el.getAttribute("data-restchip"); };
    });
    // save editor
    var sx=document.querySelector("[data-savex]");
    if(sx) sx.onclick=function(){
      var ei=+sx.getAttribute("data-savex"); var ex=S.session.exercises[ei];
      var root=sx.closest(".mrow");
      var name=root.querySelector('[data-ed="name"]').value.trim() || ex.name;
      var sub=root.querySelector('[data-ed="sub"]').value.trim();
      var rs=parseInt(root.querySelector('[data-ed="restSec"]').value,10);
      rs=isNaN(rs)?0:Math.max(0,rs);
      var ss=root.querySelector('[data-ed="ss"]').checked;
      var changed=(name!==ex.name)||(sub!==(ex.sub||""))||(rs!==(ex.restSec||0))||(ss!==!!ex.ss);
      ex.name=name; ex.sub=sub; ex.restSec=rs; ex.ss=ss;
      S.editingEx=-1; persistSession();
      if(changed){ S.templatePrompt={ei:ei}; }
      render();
    };
    // template prompt choices
    var ty=document.querySelector("[data-tpl-yes]");
    if(ty) ty.onclick=async function(){ var ei=S.templatePrompt?S.templatePrompt.ei:-1; S.templatePrompt=null; if(ei>=0) await applyToTemplate(ei); render(); };
    var tn=document.querySelector("[data-tpl-no]");
    if(tn) tn.onclick=function(){ S.templatePrompt=null; render(); };
    // delete exercise
    Array.prototype.forEach.call(document.querySelectorAll("[data-delex]"),function(el){
      el.onclick=function(){
        var ei=+el.getAttribute("data-delex");
        if(S.session.exercises.length<=1){ return; }
        if(confirm("Remove "+S.session.exercises[ei].name+" from this session?")){
          S.session.exercises.splice(ei,1); persistSession(); render();
        }
      };
    });
    // add exercise
    var ax=document.querySelector("[data-addex]");
    if(ax) ax.onclick=function(){
      S.session.exercises.push({name:"New exercise",sub:"",ss:false,restSec:60,
        sets:[{weight:"",reps:"",rpe:"",note:"",done:false}]});
      S.editingEx=S.session.exercises.length-1; persistSession(); render();
    };
    // drag to reorder
    Array.prototype.forEach.call(document.querySelectorAll("[data-handle]"),function(handle){
      handle.addEventListener("pointerdown",function(e){
        e.preventDefault();
        var list=document.getElementById("exlist"); if(!list) return;
        var row=handle.parentNode;
        row.classList.add("dragging");
        try{ handle.setPointerCapture(e.pointerId); }catch(_){}
        function move(ev){
          var rows=Array.prototype.slice.call(list.querySelectorAll(".mrow:not(.dragging)"));
          var placed=false;
          for(var i=0;i<rows.length;i++){
            var r=rows[i].getBoundingClientRect();
            if(ev.clientY < r.top + r.height/2){ list.insertBefore(row,rows[i]); placed=true; break; }
          }
          if(!placed) list.appendChild(row);
        }
        function up(){
          try{ handle.releasePointerCapture(e.pointerId); }catch(_){}
          handle.removeEventListener("pointermove",move);
          handle.removeEventListener("pointerup",up);
          row.classList.remove("dragging");
          var order=Array.prototype.slice.call(list.querySelectorAll(".mrow")).map(function(n){return +n.getAttribute("data-ei");});
          S.session.exercises=order.map(function(i){return S.session.exercises[i];});
          persistSession(); render();
        }
        handle.addEventListener("pointermove",move);
        handle.addEventListener("pointerup",up);
      });
    });
    // inputs
    Array.prototype.forEach.call(document.querySelectorAll("input[data-f]"),function(inp){
      inp.oninput=function(){
        var e=+inp.getAttribute("data-e"), s=+inp.getAttribute("data-s"), f=inp.getAttribute("data-f");
        S.session.exercises[e].sets[s][f]=inp.value; persistSession();
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-note]"),function(inp){
      inp.oninput=function(){ S.session.exercises[+inp.getAttribute("data-note")].notes=inp.value; persistSession(); };
    });
    // done toggles
    Array.prototype.forEach.call(document.querySelectorAll("[data-done]"),function(el){
      el.onclick=function(){
        var p=el.getAttribute("data-done").split("_"), e=+p[0], s=+p[1];
        var st=S.session.exercises[e].sets[s]; st.done=!st.done;
        el.parentNode.classList.toggle("done",st.done);
        el.textContent=st.done?"✓":"";
        persistSession();
        if(st.done){ // auto-open rest timer on completing a set
          var ex=S.session.exercises[e]; openTimer(ex.name, ex.restSec);
        }
      };
    });
    // add/remove set
    Array.prototype.forEach.call(document.querySelectorAll("[data-addset]"),function(el){
      el.onclick=function(){ var e=+el.getAttribute("data-addset");
        var last=S.session.exercises[e].sets.slice(-1)[0]||{};
        S.session.exercises[e].sets.push({weight:last.weight||"",reps:"",rpe:"",note:"",done:false});
        persistSession(); render(); };
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-delset]"),function(el){
      el.onclick=function(){ var e=+el.getAttribute("data-delset");
        if(S.session.exercises[e].sets.length>1){ S.session.exercises[e].sets.pop(); persistSession(); render(); } };
    });
    // rest buttons
    Array.prototype.forEach.call(document.querySelectorAll("[data-rest]"),function(el){
      el.onclick=function(){ var e=+el.getAttribute("data-rest"); var ex=S.session.exercises[e]; openTimer(ex.name,ex.restSec); };
    });
    // timer controls
    var tc=document.querySelector("[data-tclose]"); if(tc) tc.onclick=closeTimer;
    var tt=document.querySelector("[data-ttoggle]"); if(tt) tt.onclick=toggleTimer;
    Array.prototype.forEach.call(document.querySelectorAll("[data-tadj]"),function(el){
      el.onclick=function(){ adjTimer(+el.getAttribute("data-tadj")); };
    });
    // export
    var cp=document.querySelector("[data-copy]"); if(cp) cp.onclick=function(){
      var b=document.getElementById("expbox"); b.select();
      try{ navigator.clipboard.writeText(b.value); cp.textContent="COPIED ✓"; setTimeout(function(){cp.textContent="COPY ALL";},1500); }
      catch(e){ document.execCommand("copy"); }
    };
    var rf=document.querySelector("[data-refresh]"); if(rf) rf.onclick=function(){ renderExport(document.getElementById("main")); };
    // backup / restore
    var bk=document.querySelector("[data-backup]"); if(bk) bk.onclick=doBackup;
    var rs=document.querySelector("[data-restore]"); var rfile=document.getElementById("restorefile");
    if(rs&&rfile){ rs.onclick=function(){ rfile.click(); }; rfile.onchange=function(){ if(rfile.files&&rfile.files[0]) doRestore(rfile.files[0]); }; }
  }

})();
</script>

<div id="flash"><div class="msg">REST OVER</div></div>
</body>
</html>
